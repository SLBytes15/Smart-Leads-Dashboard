version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: smartleads_db
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - smartleads_network

  # Backend API
  backend:
    build: ./backend
    container_name: smartleads_backend
    ports:
      - '9000:9000'
    environment:
      - PORT=9000
      - MONGO_URI=mongodb://mongodb:27017/smartleads
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - smartleads_network

  # Frontend
  frontend:
    build: ./frontend
    container_name: smartleads_frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:9000/api
    depends_on:
      - backend
    networks:
      - smartleads_network

volumes:
  mongo_data:

networks:
  smartleads_network:
    driver: bridge